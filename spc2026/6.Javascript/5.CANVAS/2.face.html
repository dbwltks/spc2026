<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas id="myCanvas" width="400" height="400"></canvas>
    <script>
      const canvas = document.getElementById("myCanvas");
      const ctx = canvas.getContext("2d");

      ctx.beginPath();
      ctx.arc(75, 75, 50, 0, 2 * Math.PI);
      ctx.moveTo(65, 65); // 어디로 이동해야할까?
      ctx.arc(60, 65, 5, 0, 2 * Math.PI);
      ctx.moveTo(95, 65); // 어디로 이동해야할까?
      ctx.arc(90, 65, 5, 0, 2 * Math.PI);
      ctx.moveTo(110, 75); // 어디로 이동해야할까?
      ctx.arc(75, 75, 35, 0, Math.PI);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(300, 100);

      let startAngle = (1 / 4) * Math.PI;
      let endAngle = 2 * Math.PI - (1 / 4) * Math.PI;
      ctx.arc(300, 100, 50, startAngle, endAngle);
      ctx.lineTo(300, 100);

      ctx.fillStyle = "yellow";
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(300, 100);

      startAngle = (3 / 4) * Math.PI;
      endAngle = 2 * Math.PI - (3 / 4) * Math.PI;
      ctx.arc(300, 100, 50, startAngle, endAngle);
      ctx.lineTo(300, 100);

      ctx.fillStyle = "black";
      ctx.fill();
      ctx.stroke();
    </script>
  </body>
</html>
