<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    table {
      border-collapse: collapse;
    }
    td {
      border: 1px solid #000;
      padding: 10px;
    }
  </style>
  <body>
    <h1>색상 변경 버튼</h1>
    <table id="table1">
      <tr>
        <td>셀 1</td>
        <td>셀 2</td>
        <td>셀 3</td>
      </tr>
      <tr>
        <td>셀 4</td>
        <td>셀 5</td>
        <td>셀 6</td>
      </tr>
      <tr>
        <td>셀 7</td>
        <td>셀 8</td>
        <td>셀 9</td>
      </tr>
    </table>
    <hr />
    <table id="table2">
      <tr>
        <td>셀 1</td>
        <td>셀 2</td>
      </tr>
      <tr>
        <td>셀 3</td>
        <td>셀 4</td>
      </tr>
    </table>
    <button onclick="changeOddCells()">홀수셀 색상 변경</button>
    <button onclick="changeEvenCells()">짝수셀 색상 변경</button>
    <script>
      function changeOddCells() {
        const cells = document.querySelectorAll("td");
        cells.forEach((cell, index) => {
          if (index % 2 === 0) {
            cell.style.backgroundColor = "red";
          }
        });

        // for (let i = 0; i < cells.length; i++) {
        //   if (i % 2 === 0) {
        //     cells[i].style.backgroundColor = "red";
        //   }
        // }
      }
      function changeEvenCells() {
        const cells = document.querySelectorAll("td");
        cells.forEach((cell, index) => {
          if (index % 2 === 1) {
            cell.style.backgroundColor = "blue";
          }
        });
      }
    </script>
  </body>
</html>
