<html>
  <head>
    <title>나의 홈페이지</title>
  </head>
  <body>
    <h1>사용자 목록</h1>
    <ul>
      {% for user in users %}
      <li>사용자 이름 :{{ user["name"] }}</li>
      <ul>
        <li>사용자 나이 {{ user["age"] }}</li>
        <li>사용자 전화번호 {{ user["phone"] }}</li>
      </ul>
      {% endfor %}
    </ul>
  </body>
</html>
