<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #progressBar {
        width: 100%;
        height: 20px;
        background-color: orange;
      }
      #progressBar div {
        width: 0%;
        height: 100%;
        background-color: #ff0000;
      }
      #progress {
        margin-top: 10px;
        font-size: 16px;
        font-weight: bold;
        color: red;
      }
    </style>
  </head>
  <body>
    <h1>Progress Bar</h1>
    <input type="number" id="timeInput" placeholder="Enter time in seconds" />
    <button onclick="startProgress()">Start Progress</button>
    <button onclick="resetProgress()">Reset Progress</button>
    <div id="progressBar">
      <div id="progress"><span id="progressText">0%</span></div>
    </div>

    <script>
      let interval;
      const timeInput = document.getElementById("timeInput");
      const progressBar = document.getElementById("progressBar");
      const progress = document.getElementById("progress");
      const progressText = document.getElementById("progressText");

      progressText.innerHTML = "0 seconds";
      function startProgress() {
        duration = parseInt(timeInput.value);
        conssle.log("Input value:", duration);

        let elapsed = 0;
        setInterval(() => {
          elapsed++;
          const progress = (elapsed / duration) * 100;
          progressBar.style.width = `${progress}%`;

          if (progress >= 100) {
            clearInterval(interval);
          }
        }, 1000);
      }

      function resetProgress() {
        clearInterval(interval);
        progressBar.style.width = "2px";
        timeInput.value = "";
        progress.innerHTML = "0 seconds";
        elapsed = 0;
        duration = 0;
        interval = null;
      }
    </script>
  </body>
</html>
