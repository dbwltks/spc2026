<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>스플래시 페이지</title>
    <style>
      .splash {
        width: 100%;
        height: 100%;
        background-color: #000;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 1000;
        animation: fadeOut 1s ease-in-out 3s forwards;

        @keyframes fadeOut {
          from {
            opacity: 1;
          }
          to {
            opacity: 0;
          }
        }
      }

      content {
        opacity: 0;
        animation: fadeIn 1s ease-in-out 3s forwards;
        padding: 20px;

        @keyframes fadeIn {
          from {
            opacity: 0;
          }
          to {
            opacity: 1;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">로딩중....</div>
    <div class="cont">
      <h1>스플래시 페이지</h1>
      <p>스플래시 페이지입니다.</p>
    </div>
  </body>
</html>
