<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>홈페이지 인사말</h1>
    <button onclick="showModal()">Show Modal</button>
    <p>우리 홈페이지 소개 내용</p>
    <p>우리 홈페이지 소개 내용</p>
    <p>우리 홈페이지 소개 내용</p>
    <button onclick="modal()">모달 열기</button>
    <div class="modal-wrapper" style="display: none">
      <div class="modal-content">
        <div class="modal-header">안녕하세요</div>
        <div class="modal-body">모달에 입력할 내용을 작성</div>
        <div class="modal-footer">
          <button onclick="closeModal()">닫기</button>
        </div>
      </div>
    </div>
    <script>
      function showModal() {
        const modal = document.querySelector(".modal-wrapper");
        modal.style.display = "block";
      }
      function closeModal() {
        const modal = document.querySelector(".modal-wrapper");
        modal.style.display = "none";
      }
    </script>
    <style>
      .modal-wrapper {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
    </style>
    <style>
      .modal-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px;
        height: 300px;
      }
    </style>
    <style>
      .modal-header {
        background-color: #f0f0f0;
        padding: 10px;
        border-bottom: 1px solid #000;
      }
    </style>
    <style>
      .modal-body {
        padding: 10px;
        border-bottom: 1px solid #000;
      }
    </style>
    <style>
      .modal-footer {
        background-color: #f0f0f0;
        padding: 10px;
        border-top: 1px solid #000;
      }
    </style>
    <style>
      .close-button {
        background-color: #f0f0f0;
        padding: 10px;
        border-top: 1px solid #000;
      }
    </style>
  </body>
</html>
